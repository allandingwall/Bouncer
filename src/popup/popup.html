<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Bouncer</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="page">
      <header class="masthead">
        <span class="wordmark">Bouncer</span>
        <label class="switch" title="Pause or resume all blocking">
          <input type="checkbox" id="global-toggle" />
          <span class="switch-track" aria-hidden="true"></span>
          <span id="global-toggle-label" class="switch-label">active</span>
        </label>
      </header>

      <p id="current-url" class="current-url">—</p>

      <form id="add-form" class="add-form" novalidate>
        <label class="field">
          <span class="field-label">Pattern</span>
          <input
            id="pattern"
            type="text"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            required
          />
        </label>

        <label class="field">
          <span class="field-label">Match type</span>
          <select id="match-type">
            <option value="domain">Domain (and subdomains)</option>
            <option value="exact">Exact URL</option>
            <option value="wildcard">Wildcard</option>
          </select>
        </label>

        <label class="field">
          <span class="field-label">Group (optional)</span>
          <select id="group">
            <!-- options populated by JS -->
          </select>
        </label>

        <label class="field">
          <span class="field-label">Note (optional)</span>
          <input id="note" type="text" autocomplete="off" />
        </label>

        <p id="error" class="error" role="alert" hidden></p>
        <p id="status" class="status" role="status" hidden></p>

        <button type="submit" class="btn btn-primary">Block</button>
      </form>

      <footer class="footer">
        <a id="open-options" href="#">Manage all rules →</a>
      </footer>
    </main>

    <dialog id="new-group-dialog" class="new-group-dialog" aria-labelledby="new-group-title">
      <form method="dialog" class="new-group-form">
        <h2 id="new-group-title" class="new-group-title">New group</h2>
        <label class="new-group-field">
          <span class="visually-hidden">Group name</span>
          <input
            id="new-group-name"
            type="text"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            maxlength="60"
            required
          />
        </label>
        <p id="new-group-error" class="new-group-error" role="alert" hidden></p>
        <div class="new-group-actions">
          <button type="button" id="new-group-cancel" class="btn">Cancel</button>
          <button type="submit" value="confirm" class="btn btn-primary">Create</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
