<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="referrer" content="no-referrer" />
    <title>Not right now · Bouncer</title>
    <link rel="stylesheet" href="./blocked.css" />
  </head>
  <body>
    <main class="page" aria-labelledby="headline">
      <header class="masthead">
        <span class="wordmark">Bouncer</span>
        <span class="masthead-status">blocked</span>
      </header>

      <h1 id="headline" class="headline">Not right now.</h1>
      <p class="lede">You asked me to keep this one closed.</p>

      <section class="meta" aria-label="Block details">
        <dl class="meta-grid">
          <dt>URL</dt>
          <dd><code id="blocked-url" class="url">—</code></dd>
        </dl>

        <ul id="matched-rules" class="rules" aria-label="Matched rules">
          <!-- one <li class="rule"> per matched rule, populated by JS -->
        </ul>
      </section>

      <footer class="footer">
        <a id="open-options" class="footer-link" href="#">View all rules →</a>
      </footer>
    </main>

    <script type="module" src="./blocked.ts"></script>
  </body>
</html>
